# service-console 单镜像内的 nginx 边缘反代(debian nginx)。
# 路由契约(与 hub/platform 接口对齐):
#   /ws/agent/ → hub 127.0.0.1:8081       远程 agent WebSocket(hub: /ws/agent/{agent_id})
#   其余一切    → platform 127.0.0.1:8080   单端口同出 SPA(/) 与 API(/api/*)
# 浏览器永不直连 hub;hub 的 /api 仅容器内被 platform 服务端调用。

user  www-data;
worker_processes  auto;
error_log  /dev/stderr  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout  65;

    # WebSocket 升级映射:有 Upgrade 头则 Connection: upgrade,否则置空走 keepalive。
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 插件包上传上限:须与 platform 的 PLUGIN_MAX_UPLOAD_BYTES(缺省 200MB)对齐,
    # 否则大包在边缘即被 413 拦下。调大上传上限时两处一起改。
    client_max_body_size 200m;

    upstream platform_upstream {
        server 127.0.0.1:8080;
    }
    upstream hub_upstream {
        server 127.0.0.1:8081;
    }

    # ── HTTP 80 ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # agent WebSocket:必须在通配 location / 之前,且用前缀匹配命中 /ws/agent/...。
        location /ws/agent/ {
            proxy_pass http://hub_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WS 长连:拉长读/发超时,避免心跳间隔内被 nginx 主动断开。
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 其余一切(SPA / 与 /api/*)→ platform。
        location / {
            proxy_pass http://platform_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS 443(证书就绪后启用)──────────────────────────────────────────────
    # 部署步骤:① compose 取消 ./certs 卷挂载注释 → /etc/nginx/certs;
    #          ② 取消下段注释,填证书文件名;③(可选)把上面 listen 80 改为 301 跳转。
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
