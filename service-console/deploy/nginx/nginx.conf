# service-platform 部署栈边缘反代配置(nginx:1.27-alpine)。
#
# 路由契约(严格对齐 hub/platform 接口):
#   - /ws/agent/  → service-hub:8080   远程 agent 的 WebSocket 接入(hub agent_ws.py: /ws/agent/{agent_id})
#   - 其余一切     → service-platform:8080  platform 单端口同时出 SPA(/) 与 API(/api/*)
#   浏览器永不直连 hub;hub 的 /api 只在 svc_internal 内网给 platform 服务端调用,不经此暴露。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 仅最小必要 MIME(SPA 静态产物由 platform 自身的 StaticFiles 出,nginx 只做透传反代)。
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # WebSocket 升级映射:有 Upgrade 头则 Connection: upgrade,否则置空(普通 HTTP 走 keepalive)。
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 插件包上传上限:须与 platform 的 PLUGIN_MAX_UPLOAD_BYTES(缺省 200MB)对齐,
    # 否则大包在边缘即被 413 拦下。调大上传上限时两处一起改。
    client_max_body_size 200m;

    # 上游:容器名 = compose service 名,经 svc_internal 内网解析。
    upstream service_platform_upstream {
        server service-platform:8080;
    }
    upstream service_hub_upstream {
        server service-hub:8080;
    }

    # ── HTTP 80 ─────────────────────────────────────────────────────────────────
    # 本任务不签证书,默认直接在 80 提供服务。生产启用 TLS 后,建议把此 server 改为
    # 301 跳转到 https(见下方 443 段注释),证书就绪前先用 80 跑通拓扑。
    server {
        listen 80;
        server_name _;

        # agent WebSocket:必须在通配 location / 之前,且用前缀匹配命中 /ws/agent/...。
        location /ws/agent/ {
            proxy_pass http://service_hub_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WS 长连:拉长读/发超时,避免心跳间隔内被 nginx 主动断开。
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 其余一切(SPA / 与 /api/*)→ platform。
        location / {
            proxy_pass http://service_platform_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── HTTPS 443(证书就绪后启用)──────────────────────────────────────────────
    # 本任务不签证书,整段注释占位。生产部署步骤:
    #   1) 在 compose nginx 服务取消 ./nginx/certs 卷挂载注释,把证书目录挂进 /etc/nginx/certs;
    #   2) 取消下方 server 段注释,填 ssl_certificate / ssl_certificate_key 实际文件名;
    #   3) (可选)把上面 listen 80 的 server 改为 `return 301 https://$host$request_uri;` 强制跳转。
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /ws/agent/ {
    #         proxy_pass http://service_hub_upstream;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 3600s;
    #         proxy_send_timeout 3600s;
    #     }
    #
    #     location / {
    #         proxy_pass http://service_platform_upstream;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
