[pytest]
# 过滤 Pydantic 2.12 + FastAPI 0.115 已知的良性噪声(评审 H2 强制 MODEL_CONFIG 用
# alias_generator=to_camel;FastAPI 对**请求体**模型按字段重建 TypeAdapter 时,会把
# alias_generator 产生的 validation_alias/serialization_alias 当作 Annotated 元数据
# 再应用一次,该上下文下无效故 Pydantic 抛 UnsupportedFieldAttributeWarning)。
# 校验/序列化均正确(见 tests/test_crud_plugin.py 全绿),仅是 FastAPI 内部重建产生
# 的告警,不代表契约问题——故按消息文本精确过滤,不放宽到整类 UserWarning。
# 三种 attr 变体(alias / validation_alias / serialization_alias)消息同形,按稳定子串
# 「attribute with value … has no effect in the context」精确匹配该 UserWarning 子类。
filterwarnings =
    ignore:The .* attribute with value .* has no effect in the context.*:UserWarning
