name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  service-agent:
    runs-on: ubuntu-latest
    env:
      WS_URL: ws://localhost:8080/ws/agent
      AGENT_KEY: ci-agent-key
      AGENT_ID: ci-agent
    defaults:
      run:
        working-directory: service-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall .

      - name: Import smoke test
        run: python -c "import agent; import core.ws_client; import core.health_server; print('service-agent import ok')"

      - name: Run tests with coverage gate
        run: pytest --cov=agent --cov=config --cov=core --cov=services --cov-report=term-missing --cov-fail-under=97 -q

      - name: Build Docker image
        run: docker build -t service-agent:ci .

      - name: Validate docker compose v2 in image
        run: |
          docker run --rm service-agent:ci python - <<'PY'
          import shutil
          import subprocess

          assert shutil.which("docker") is not None, "docker CLI is missing in service-agent image"
          assert shutil.which("docker-compose") is None, "docker-compose v1 should not be present in service-agent image"
          subprocess.run(["docker", "compose", "version"], check=True)
          print("service-agent image has docker compose v2 only")
          PY

  service-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ADMIN_TOKEN: ci-admin-token
    defaults:
      run:
        working-directory: service-hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall app migrations scripts

      - name: Import smoke test
        run: python -c "import sys; sys.path.insert(0, '.'); import app.main; print('service-hub import ok')"

      - name: Validate Alembic upgrade
        run: |
          python - <<'PY'
          import tempfile
          from pathlib import Path
          from app.db import Database

          temp_dir = Path(tempfile.mkdtemp())
          database = Database(f"sqlite:///{temp_dir / 'ci.db'}")
          database.init_schema()
          print("alembic upgrade ok")
          PY

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q

      - name: Build Docker image
        run: docker build -t service-hub:ci .

  service-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: service-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall app migrations

      - name: Import smoke test
        run: python -c "import sys; sys.path.insert(0, '.'); import app.main; print('service-platform import ok')"

      - name: Validate Alembic upgrade
        run: |
          python - <<'PY'
          import tempfile
          from pathlib import Path
          from app.db import Database

          temp_dir = Path(tempfile.mkdtemp())
          database = Database(f"sqlite:///{temp_dir / 'ci.db'}")
          database.init_schema()
          print("alembic upgrade ok")
          PY

      - name: Run tests with coverage gate
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        # 评审 D3(系统性根因:此前仅 pytest -q,无覆盖率门 → 零覆盖文件永不让 CI 转红)。
        # 显式 -p pytest_cov:PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 会禁插件自动加载,须手动启用 cov 插件。
        # 阈值 94 取自当前实测水位(94.11%)的整数下限,锁住覆盖率防回退(参 service-agent 的 97)。
        run: python -m pytest -p pytest_cov --cov=app --cov-report=term-missing --cov-fail-under=94 -q

      - name: Build Docker image
        run: docker build -t service-platform:ci .

  service-platform-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: service-platform/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build SPA
        run: npm run build

  phase1-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run phase-one cross-service E2E
        run: python service-hub/scripts/validate_phase1_e2e.py
